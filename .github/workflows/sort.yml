name: Auto Sort

on:
  pull_request:
    paths:
      - "awesome-list.json"

jobs:
  auto-sort:
    name: Auto Sort Entries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Sort JSON entries
        run: npm run sort

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-sort JSON entries"
          commit_author: "github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
